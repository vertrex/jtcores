sdram:
  banks:
    - buses:
        - name: cpu_rom 
          addr_width: 19
          data_width: 16
        #- name: gfx1_rom
          #addr_width: 17
          #data_width: 16
          #offset : GFX_1_OFFSET
    - buses: 
        - name: char_rom_1 
          addr_width: 16
          data_width: 8 # 8 bits 
          #offset : CHAR_1_OFFSET
        - name: char_rom_2 
          addr_width: 16
          data_width: 8 
          offset : CHAR_2_OFFSET
    - buses: 
        - name: gfx2_rom
          addr_width: 20
          data_width: 16
          #offset : GFX_2_OFFSET
        - name: gfx3_rom
          addr_width: 19
          data_width: 16
          offset : GFX_3_OFFSET
        - name: gfx4_rom
          addr_width: 19
          data_width: 16
          offset : GFX_4_OFFSET
    - buses:
        - name: z80_rom
          addr_width: 13 # 8.m3
          data_width: 8 
        - name: bank_rom 
          addr_width: 16 # 7.m7  
          data_width: 8 
          offset: BANK_OFFSET 
        - name: pcm_rom 
          addr_width: 17 # 9.m1 
          data_width: 8 
          offset: OKI_OFFSET 
