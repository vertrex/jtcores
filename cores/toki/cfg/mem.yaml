sdram:
  banks:
    - buses:
        - name: cpu_rom
          addr_width: 19
          data_width: 16
    - buses:
        - name: char_rom_1
          addr_width: 16
          #data_width: 16
          data_width: 8
        - name: char_rom_2
          addr_width: 16
          data_width: 8
          offset : CHAR_2_OFFSET
          #cs: LVBL
    - buses:
        - name: gfx2_rom
          addr_width: 20
          data_width: 16
        - name: gfx3_rom
          addr_width: 19
          data_width: 16
          offset : GFX_3_OFFSET
          #cs: LVBL
        #- name: gfx4_rom
          #addr_width: 19
          #data_width: 16
          #offset : GFX_4_OFFSET
          #cs: LVBL
    - buses:
      #rom + music on same bus make glitch not fast enough
        - name: gfx4_rom
          addr_width: 19
          data_width: 16
        - name: z80_rom
          addr_width: 13
          data_width: 8
          offset : Z80_OFFSET
        - name: bank_rom
          addr_width: 16
          data_width: 8
          offset: BANK_OFFSET
        - name: pcm_rom
          addr_width: 17
          data_width: 8
          offset: OKI_OFFSET


