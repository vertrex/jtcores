params:
  #- { name: GFX_2_OFFSET,     value:  "22'h40000" }
  - { name: GFX_3_OFFSET,     value:  "22'h80000" }
  - { name: GFX_4_OFFSET,     value:  "22'hc0000" }
  #audio bank 1
  - { name: BANK_OFFSET,      value: "22'h1000" } # start after 8.m3 (2nd bank start at + BA1_START )
  - { name: OKI_OFFSET,       value: "22'h9000" } # start at 8.m3 + 7.m7 / 2 
    
clocks:
  clk:
    - freq:  1000000
      outputs:
        - oki
    #- freq: 1056000
    #- freq: 3579545
      #outputs:
        #- cen_fm
        #- cen_fm2

sdram:
  banks:
    - buses:
        - name: cpu_rom 
          addr_width: 19
          data_width: 16
    - buses: 
        - name: char_rom
          addr_width: 17
          data_width: 16 # 8,8 interleaved 
          cs: LVBL
    - buses: 
        - name: gfx2_rom
          addr_width: 20
          data_width: 16
          #offset : GFX_2_OFFSET
        - name: gfx3_rom
          addr_width: 19
          data_width: 16
          offset : GFX_3_OFFSET
        - name: gfx4_rom
          addr_width: 19
          data_width: 16
          offset : GFX_4_OFFSET
    - buses:
        - name: z80_rom
          addr_width: 13 # 8.m3
          data_width: 8 
        - name: bank_rom 
          addr_width: 16 # 7.m7  
          data_width: 8 
          offset: BANK_OFFSET 
        - name: pcm_rom 
          addr_width: 17 # 9.m1 
          data_width: 8 
          offset: OKI_OFFSET 
